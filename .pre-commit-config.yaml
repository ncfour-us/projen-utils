# ~~ Generated by projen. To modify, edit .projenrc.ts and run "pnpm exec projen".

repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.3
    hooks:
      - id: commitizen
        stages:
          - commit-msg
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: (.*\.svg|^\.yarn/.*)
        stages:
          - pre-commit
      - id: end-of-file-fixer
        exclude: ^(\.pre-commit-config\.yaml|\.gitignore|\.gitattributes|\.projen/.*|\.github/.*|.*\.svg|\.yarn/.*|LICENSE|.mergify.yml|tsconfig.json|tsconfig.dev.json|.npmignore|API.md|CHANGELOG.md|typedoc.json|)$
        stages:
          - pre-commit
      - id: check-added-large-files
        stages:
          - pre-commit
      - id: check-yaml
        exclude: ^(pnpm-lock.yaml)$
        stages:
          - pre-commit
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: node
        entry: pnpm eslint
        files: \.[jt]sx?$
        types:
          - file
        stages:
          - pre-commit
        additional_dependencies:
          - jiti
